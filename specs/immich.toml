input_path = "specs/immich.json"
output_path = "src"
target_framework = "net10.0"
generate_nullable_reference_types = true
generate_data_annotations = true

global_usings = [
    "System.Text.Json.Serialization"
]

[models]
namespace = "Apigen.Immich.Models"
project_name = "Apigen.Immich.Models"

[model_generation]
strategy = "SingleModel"

[enum_generation]
generation_mode = "Raw"
add_json_string_enum_converter = true
add_json_string_enum_member_name = true

[serialization]
nullable_for_optional_properties = true
ignore_condition = "WhenWritingNull"

[client]
generate_client = true
namespace = "Apigen.Immich.Client"
project_name = "Apigen.Immich.Client"
client_class_name = "ImmichApiClient"
use_async_suffix = true
generate_interfaces = true

[client.request_organization]
strategy = "individual_files"
directory = "Requests"
include_base_classes = true

[client.authentication]
token_header = "x-api-key"

[formatting]
use_spaces = true
indent_width = 2

[header]
include_header = true
include_timestamp = false
include_source = true
include_generator_info = true
include_config_info = false
custom_text = "Immich API Models - Auto-generated from OpenAPI specification"
